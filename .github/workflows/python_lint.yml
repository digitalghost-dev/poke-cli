name: Python Lint

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'data_platform/**'

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: data_platform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install ruff
        run: uv tool install ruff

      - name: Lint
        run: ruff check pipelines/
