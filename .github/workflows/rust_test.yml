name: Rust Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'services/**'

jobs:
  tests:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: services

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test
