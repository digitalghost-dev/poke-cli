checks for comp_tcg_tournaments:
  - row_count > 30:
      name: Minimum row count check

  - schema:
      fail:
        when required column missing: [event_id, name, count, rounds, last_updated]
        when wrong column type:
          count: bigint
          rounds: bigint

  - missing_count(event_id) = 0:
      name: Event ID completeness

  - missing_count(name) = 0:
      name: Name completeness

  - duplicate_count(event_id) = 0:
      name: Event ID uniqueness

  - invalid_count(count) = 0:
      valid min: 1
      name: Masters count positive

  - invalid_count(rounds) = 0:
      valid min: 1
      name: Rounds positive
